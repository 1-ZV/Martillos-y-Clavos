<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Products</title>
    <style>
        table { width: 50%; border-collapse: collapse; margin: 20px 0; }
        th, td { border: 1px solid #dddddd; text-align: left; padding: 8px; }
        th { background-color: #f2f2f2; }
    </style>
</head>
<body>

    <h2>Products</h2>

    <table>
        <thead>
            <form action="add_products" method="get">
                <input type="submit" value="Add Product">
            </form>
            <form action="delete_products" method="get">
                <input type="submit" value="Delete Product">
            </form>
            <form action="edit_products" method="get">
                <input type="submit" value="Edit Product">
            </form>
            <form action="search_products" method="get">
                <input type="submit" value="Search Product">
            </form>
            <tr>
                <th>Id</th>
                <!--th>Supplier_id</th-->
                <th>Name</th>
                <th>Description</th>
                <th>Price</th>
                <th>Stock</th>
                <th>Accions</th>
            </tr>
        </thead>
        <tbody>
            {% for product in products %}
            <tr>
                <td>{{ product.id }}</td>
                <td>{{ product.name }}</td>
                <td>{{ product.description }}</td>
                <td>{{ product.price }}</td>
                <td>{{ product.stock }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

</body>
</html>
